environment:
  venv_path: .venv-model-benchmark
  env_file: .model_benchmark.env
  evalscope_extras: perf
  pip_index_url: https://pypi.tuna.tsinghua.edu.cn/simple
  pip_trusted_host: pypi.tuna.tsinghua.edu.cn
  modelscope_cache: .cache/modelscope
  hf_endpoint: https://hf-mirror.com

model:
  api: openai
  name: qwen3.6-plus
  api_url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  api_key_env: DASHSCOPE_API_KEY

dataset:
  type: simulated
  name: simulated_openqa
  path: outputs/simulated_openqa.jsonl
  simulated_count: 12
  output_tokens: 128
  random_prompt_tokens: 512

token_accounting:
  mode: prefer_api_usage
  on_missing_usage: fallback_tokenizer
  tokenizer_source: modelscope
  tokenizer_path: Qwen/Qwen3-0.6B

scenarios:
  smoke:
    enabled: true
    parallel: 1
    number: 3
    max_tokens: 32
  gradient:
    enabled: true
    parallels: [1, 2, 5, 10, 20]
    number_multiplier: 10
    min_number: 50
    max_tokens: 128
    sleep_interval: 5
  rate:
    enabled: false
    parallel: 10
    rates: [1.0, 2.0, 5.0]
    number_multiplier: 60
    min_number: 60
    max_tokens: 128
    sleep_interval: 5
  stability:
    enabled: false
    parallel: 10
    duration_minutes: 30
    window_minutes: 5
    max_tokens: 128
  length_matrix:
    enabled: false
    parallel: 5
    number: 100
    input_tokens: [100, 500, 1000]
    output_tokens: [32, 128, 256]

run:
  outputs_dir: outputs/model_benchmark
  stream: true
  headers: {}
  connect_timeout: null
  read_timeout: null
  total_timeout: 21600
  warmup_requests: 0
  warmup_parallel: 1
  cooldown_seconds: 0
